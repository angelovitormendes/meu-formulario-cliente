<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Cliente</title>
    <style>
        /* Estilos Base e Reset */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            max-width: 750px;
            margin: 10px auto;
            box-sizing: border-box;
            flex-grow: 1;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 700;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
            font-size: 0.85em; /* Fonte levemente menor para economizar espaço */
        }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 180px;
            margin-bottom: 5px;
        }

        .input-btn-group {
            display: flex;
            gap: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #cdd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95em;
            color: #333;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 12px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
        }

        .btn-search:hover { background-color: #0056b3; }
        .btn-search:disabled { background-color: #ccc; cursor: not-allowed; }

        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            outline: none;
        }

        .message {
            background-color: #e7f3fe;
            border-left: 5px solid #2196F3;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        #actionSection {
            margin-top: 30px;
            border-top: 2px dashed #d0d0d0;
            padding-top: 20px;
        }

        #reportOutput {
            white-space: pre-wrap;
            background-color: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            font-family: monospace;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
        }

        #sendToWhatsAppButton { background-color: #25d366; }
        #copyReportButton { background-color: #007bff; }
        #clearFormButton { background-color: #dc3545; }

        @media (max-width: 768px) { .form-group { min-width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastro de Cliente</h2>
        
        <div class="message">
            <strong>Atenção:</strong> Prazo de 24h para processamento.
        </div>

        <form id="customerForm">
            <label for="cnpj">CNPJ:</label>
            <div class="input-btn-group">
                <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" required>
                <button type="button" id="btnCnpj" class="btn-search" onclick="buscaCnpj()" title="Consultar CNPJ">🔍</button>
            </div>

            <label for="razaoSocial">Razão Social:</label>
            <input type="text" id="razaoSocial" name="razaoSocial" required>

            <label for="nomeFantasia">Nome Fantasia:</label>
            <input type="text" id="nomeFantasia" name="nomeFantasia" required>

            <label for="nomeResponsavel">Nome do Responsável:</label>
            <input type="text" id="nomeResponsavel" name="nomeResponsavel" required>

            <div class="form-row">
                <div class="form-group">
                    <label for="celular">Celular:</label>
                    <input type="tel" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX" required>
                </div>
            </div>

            <h3 style="margin-top: 20px; font-size: 1.1em; border-bottom: 1px solid #eee;">Endereço</h3>
            
            <div class="form-row">
                <div class="form-group" style="flex: 0 0 40%;">
                    <label for="cep">CEP:</label>
                    <div class="input-btn-group">
                        <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                        <button type="button" id="btnCep" class="btn-search" onclick="triggerCep()" title="Consultar CEP">🔍</button>
                    </div>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="logradouro">Logradouro:</label>
                    <input type="text" id="logradouro" name="logradouro" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 0 0 25%;">
                    <label for="numero">Número:</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="complemento">Complemento:</label>
                    <input type="text" id="complemento" name="complemento">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bairro">Bairro:</label>
                    <input type="text" id="bairro" name="bairro" required>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" name="cidade" required>
                </div>
                <div class="form-group" style="flex: 0 0 20%;">
                    <label for="uf">UF:</label>
                    <input type="text" id="uf" name="uf" required maxlength="2">
                </div>
            </div>

            <label for="emailCobranca">E-mail de Cobrança:</label>
            <input type="email" id="emailCobranca" name="emailCobranca" required>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefoneCobranca">Tel. Cobrança:</label>
                    <input type="tel" id="telefoneCobranca" name="telefoneCobranca" required>
                </div>
                <div class="form-group">
                    <label for="telefoneSuporte">Tel. Suporte:</label>
                    <input type="tel" id="telefoneSuporte" name="telefoneSuporte" required>
                </div>
            </div>

            <label for="emailEmpresa">E-mail da Empresa:</label>
            <input type="email" id="emailEmpresa" name="emailEmpresa" required>

            <label for="contabilidade">Contabilidade:</label>
            <input type="text" id="contabilidade" name="contabilidade" required>

            <label for="regimeEmpresa">Regime da Empresa:</label>
            <select id="regimeEmpresa" name="regimeEmpresa" required>
                <option value="">Selecione</option>
                <option value="Simples Nacional">Simples Nacional</option>
                <option value="Lucro Presumido">Lucro Presumido</option>
                <option value="Lucro Real">Lucro Real</option>
                <option value="MEI">MEI</option>
            </select>

            <div class="form-row">
                <div class="form-group">
                    <label for="valorContrato">Valor do Contrato:</label>
                    <input type="text" id="valorContrato" name="valorContrato" required>
                </div>
                <div class="form-group">
                    <label for="tipoContrato">Tipo de Contrato:</label>
                    <select id="tipoContrato" name="tipoContrato" onchange="toggleContractDetails()" required>
                        <option value="">Selecione</option>
                        <option value="Anual">Anual</option>
                        <option value="Mensal">Mensal</option>
                    </select>
                </div>
            </div>

            <div id="contractDetails" style="display:none; border: 1px solid #eee; padding: 10px; margin-bottom: 15px;">
                <label for="formaPagamento">Pagamento:</label>
                <select id="formaPagamento" name="formaPagamento" onchange="togglePaymentInstallments()">
                    <option value="">Selecione</option>
                    <option value="Boleto">Boleto</option>
                    <option value="Cartao">Cartão</option>
                    <option value="Pix">Pix</option>
                </select>
                <label for="diaVencimento">Dia Vencimento:</label>
                <input type="number" id="diaVencimento" name="diaVencimento" min="1" max="31">
                <div id="installments" style="display: none;">
                    <label for="parcelasCartao">Parcelas (máx 5x):</label>
                    <input type="number" id="parcelasCartao" name="parcelasCartao" min="1" max="5">
                </div>
            </div>

            <label>Tipo de Sistema:</label>
            <div style="font-size: 0.9em; margin-bottom: 15px;">
                <input type="radio" id="f1" name="tipoSistema" value="Fiscal Simples" required> <label style="display:inline" for="f1">Fiscal Simples</label><br>
                <input type="radio" id="f2" name="tipoSistema" value="Fiscal Normal"> <label style="display:inline" for="f2">Fiscal Normal</label><br>
                <input type="radio" id="f3" name="tipoSistema" value="Fiscal MEI"> <label style="display:inline" for="f3">Fiscal MEI</label><br>
                <input type="radio" id="f4" name="tipoSistema" value="Gerencial"> <label style="display:inline" for="f4">Gerencial</label>
            </div>

            <label for="migracao">Haverá Migração?</label>
            <select id="migracao" name="migracao" onchange="toggleMigrationDetails()" required>
                <option value="">Selecione</option>
                <option value="Sim">Sim</option>
                <option value="Nao">Não</option>
            </select>

            <div id="migrationDetails" style="display:none;">
                <textarea id="dadosMigracao" name="dadosMigracao" rows="3" placeholder="Detalhes..."></textarea>
            </div>

            <label for="observacao">Observação:</label>
            <textarea id="observacao" name="observacao" rows="3"></textarea>
        </form>

        <div id="actionSection">
            <div id="reportOutput">Preencha os dados...</div>
            <div class="action-buttons">
                <button type="button" id="sendToWhatsAppButton" onclick="sendToWhatsApp()">WhatsApp</button>
                <button type="button" id="copyReportButton" onclick="copyReportToClipboard()">Copiar</button>
                <button type="button" id="clearFormButton" onclick="clearFormAndReport()">Limpar</button>
            </div>
        </div>
    </div>

    <script>
        // --- FUNÇÕES DE MÁSCARA ---
        function maskPhone(event) {
            let v = event.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d)/, "($1) $2");
            event.target.value = v;
        }

        function maskCnpj(event) {
            let v = event.target.value.replace(/\D/g, '');
            if (v.length > 14) v = v.substring(0, 14);
            v = v.replace(/^(\d{2})(\d)/, "$1.$2");
            v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
            v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
            v = v.replace(/(\d{4})(\d)/, "$1-$2");
            event.target.value = v;
        }

        function maskCep(event) {
            let v = event.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.substring(0, 8);
            v = v.replace(/^(\d{5})(\d)/, "$1-$2");
            event.target.value = v;
        }

        // --- CONSULTA CNPJ (BRASIL API) ---
        async function buscaCnpj() {
            const cnpjInput = document.getElementById('cnpj');
            const btn = document.getElementById('btnCnpj');
            const cnpj = cnpjInput.value.replace(/\D/g, '');

            if (cnpj.length !== 14) {
                alert("CNPJ incompleto!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳";

            try {
                const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                document.getElementById('razaoSocial').value = data.razao_social || '';
                document.getElementById('nomeFantasia').value = data.nome_fantasia || data.razao_social || '';
                document.getElementById('logradouro').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.municipio || '';
                document.getElementById('uf').value = data.uf || '';
                document.getElementById('cep').value = data.cep || '';
                document.getElementById('emailEmpresa').value = data.email || '';
                
                updateReport();
            } catch (e) {
                alert("Erro ao consultar CNPJ. Verifique a conexão ou se o número está correto.");
            } finally {
                btn.disabled = false;
                btn.innerText = "🔍";
            }
        }

        // --- CONSULTA CEP (BRASIL API) ---
        async function buscaCep(cepValue) {
            const cleanCep = cepValue.replace(/\D/g, '');
            const btn = document.getElementById('btnCep');
            
            if (cleanCep.length !== 8) return;

            btn.disabled = true;

            try {
                const response = await fetch(`https://brasilapi.com.br/api/cep/v1/${cleanCep}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                document.getElementById('logradouro').value = data.street || '';
                document.getElementById('bairro').value = data.neighborhood || '';
                document.getElementById('cidade').value = data.city || '';
                document.getElementById('uf').value = data.state || '';
                document.getElementById('numero').focus();
                updateReport();
            } catch (e) {
                console.error("Erro CEP");
            } finally {
                btn.disabled = false;
            }
        }

        function triggerCep() {
            const cep = document.getElementById('cep').value;
            if(cep.replace(/\D/g, '').length === 8) buscaCep(cep);
            else alert("Digite o CEP completo.");
        }

        // --- LÓGICA DE INTERFACE ---
        function toggleContractDetails() {
            const tipo = document.getElementById('tipoContrato').value;
            document.getElementById('contractDetails').style.display = (tipo === 'Anual' || tipo === 'Mensal') ? 'block' : 'none';
            updateReport();
        }

        function togglePaymentInstallments() {
            const forma = document.getElementById('formaPagamento').value;
            document.getElementById('installments').style.display = forma === 'Cartao' ? 'block' : 'none';
            updateReport();
        }

        function toggleMigrationDetails() {
            const migra = document.getElementById('migracao').value;
            document.getElementById('migrationDetails').style.display = migra === 'Sim' ? 'block' : 'none';
            updateReport();
        }

        function updateReport() {
            const form = document.getElementById('customerForm');
            const data = new FormData(form);
            let msg = "📝 *DADOS DO CADASTRO*\n\n";
            
            msg += `*CNPJ:* ${data.get('cnpj') || '-'}\n`;
            msg += `*Razão:* ${data.get('razaoSocial') || '-'}\n`;
            msg += `*Fantasia:* ${data.get('nomeFantasia') || '-'}\n`;
            msg += `*Resp:* ${data.get('nomeResponsavel') || '-'}\n`;
            msg += `*Celular:* ${data.get('celular') || '-'}\n\n`;
            msg += `📍 *ENDEREÇO:*\n${data.get('logradouro')}, ${data.get('numero')}\n`;
            msg += `${data.get('bairro')} - ${data.get('cidade')}/${data.get('uf')}\n`;
            msg += `CEP: ${data.get('cep')}\n\n`;
            msg += `*Regime:* ${data.get('regimeEmpresa') || '-'}\n`;
            msg += `*Valor:* R$ ${data.get('valorContrato') || '0,00'} (${data.get('tipoContrato') || '-'})`;

            document.getElementById('reportOutput').innerText = msg;
            localStorage.setItem('tempReport', msg);
        }

        function sendToWhatsApp() {
            const report = localStorage.getItem('tempReport');
            if(!document.getElementById('customerForm').checkValidity()) {
                document.getElementById('customerForm').reportValidity();
                return;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
        }

        function copyReportToClipboard() {
            const report = document.getElementById('reportOutput').innerText;
            navigator.clipboard.writeText(report).then(() => alert('Copiado!'));
        }

        function clearFormAndReport() {
            if(confirm('Limpar tudo?')) {
                document.getElementById('customerForm').reset();
                updateReport();
            }
        }

        window.onload = () => {
            document.getElementById('celular').addEventListener('input', maskPhone);
            document.getElementById('cnpj').addEventListener('input', maskCnpj);
            document.getElementById('cep').addEventListener('input', (e) => {
                maskCep(e);
                if(e.target.value.replace(/\D/g, '').length === 8) buscaCep(e.target.value);
            });
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('input', updateReport);
            });
        };
    </script>
</body>
</html>
