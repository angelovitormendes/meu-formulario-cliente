<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Cliente</title>
    <style>
        /* Estilos Base e Reset */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            max-width: 750px;
            margin: 20px auto;
            box-sizing: border-box;
            flex-grow: 1;
            transition: transform 0.3s ease-in-out;
        }

        .container:focus-within {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
            font-size: 0.98em;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 18px;
            border: 1px solid #cdd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1.05em;
            color: #333;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.2);
            outline: none;
            background-color: #f9fcff;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            font-weight: normal;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.95em;
            color: #666;
        }

        .message, .footer-message {
            margin-bottom: 25px;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.9em;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .message {
            background-color: #e7f3fe;
            border-left: 8px solid #2196F3;
            color: #333;
        }
        .footer-message {
            background-color: #fff3cd;
            border-left: 8px solid #ffc107;
            color: #333;
            margin-top: 25px;
        }

        #contractDetails, #migrationDetails {
            display: none;
            border: 1px solid #e0e0e0;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            background-color: #fefefe;
        }

        #actionSection {
            margin-top: 40px;
            border-top: 2px dashed #d0d0d0;
            padding-top: 30px;
            text-align: center;
        }

        #reportOutput {
            white-space: pre-wrap;
            background-color: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            font-family: 'Roboto Mono', monospace;
            color: #333;
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .action-buttons button {
            flex: 1;
            min-width: 180px;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #sendToWhatsAppButton { background-color: #25d366; color: white; }
        #copyReportButton { background-color: #007bff; color: white; }
        #clearFormButton { background-color: #dc3545; color: white; }

        @media (max-width: 768px) {
            .form-group { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Formulário de Cadastro de Cliente</h2>
        <div class="message">
            <p><strong>Atenção:</strong> Todos os cadastros terão um prazo mínimo de 24 horas para serem feitos e o contrato enviado.</p>
        </div>

        <form id="customerForm">
            <label for="nomeFantasia">Nome Fantasia:</label>
            <input type="text" id="nomeFantasia" name="nomeFantasia" required>

            <label for="nomeResponsavel">Nome do Responsável da Empresa:</label>
            <input type="text" id="nomeResponsavel" name="nomeResponsavel" required>

            <div class="form-row">
                <div class="form-group">
                    <label for="celular">Celular:</label>
                    <input type="tel" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX" required inputmode="numeric">
                </div>
                <div class="form-group">
                    <label for="cnpj">CNPJ:</label>
                    <input type="text" id="cnpj" name="cnpj" placeholder="XX.XXX.XXX/XXXX-XX" required inputmode="numeric">
                </div>
            </div>

            <h3 style="margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Endereço Completo</h3>
            
            <div class="form-row">
                <div class="form-group" style="flex: 0 0 30%;">
                    <label for="cep">CEP:</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" required maxlength="9">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="logradouro">Logradouro (Rua/Av):</label>
                    <input type="text" id="logradouro" name="logradouro" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 0 0 20%;">
                    <label for="numero">Número:</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="complemento">Complemento:</label>
                    <input type="text" id="complemento" name="complemento">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bairro">Bairro:</label>
                    <input type="text" id="bairro" name="bairro" required>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" name="cidade" required>
                </div>
                <div class="form-group" style="flex: 0 0 15%;">
                    <label for="uf">UF:</label>
                    <input type="text" id="uf" name="uf" required maxlength="2">
                </div>
            </div>

            <label for="emailCobranca">E-mail de Cobrança:</label>
            <input type="email" id="emailCobranca" name="emailCobranca" required>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefoneCobranca">Telefone de Cobrança:</label>
                    <input type="tel" id="telefoneCobranca" name="telefoneCobranca" placeholder="(XX) XXXXX-XXXX" required>
                </div>
                <div class="form-group">
                    <label for="telefoneSuporte">Telefone de Suporte:</label>
                    <input type="tel" id="telefoneSuporte" name="telefoneSuporte" placeholder="(XX) XXXXX-XXXX" required>
                </div>
            </div>

            <label for="emailEmpresa">E-mail da Empresa:</label>
            <input type="email" id="emailEmpresa" name="emailEmpresa" required>

            <label for="contabilidade">Contabilidade:</label>
            <input type="text" id="contabilidade" name="contabilidade" required>

            <label for="regimeEmpresa">Regime da Empresa:</label>
            <select id="regimeEmpresa" name="regimeEmpresa" required>
                <option value="">Selecione</option>
                <option value="Simples Nacional">Simples Nacional</option>
                <option value="Lucro Presumido">Lucro Presumido</option>
                <option value="Lucro Real">Lucro Real</option>
                <option value="MEI">MEI</option>
            </select>

            <div class="form-row">
                <div class="form-group">
                    <label for="valorContrato">Valor do Contrato:</label>
                    <input type="text" id="valorContrato" name="valorContrato" required>
                </div>
                <div class="form-group">
                    <label for="tipoContrato">Tipo de Contrato:</label>
                    <select id="tipoContrato" name="tipoContrato" onchange="toggleContractDetails()" required>
                        <option value="">Selecione</option>
                        <option value="Anual">Anual</option>
                        <option value="Mensal">Mensal</option>
                    </select>
                </div>
            </div>

            <div id="contractDetails">
                <label for="formaPagamento">Forma de Pagamento (Anual):</label>
                <select id="formaPagamento" name="formaPagamento" onchange="togglePaymentInstallments()">
                    <option value="">Selecione</option>
                    <option value="Boleto">Boleto</option>
                    <option value="Cartao">Cartão</option>
                    <option value="Pix">Pix</option>
                </select>

                <label for="diaVencimento">Dia do Vencimento:</label>
                <input type="number" id="diaVencimento" name="diaVencimento" min="1" max="31">

                <div id="installments" style="display: none;">
                    <label for="parcelasCartao">Quantas Parcelas (máximo 5x):</label>
                    <input type="number" id="parcelasCartao" name="parcelasCartao" min="1" max="5">
                </div>
            </div>

            <label>Tipo de Sistema:</label>
            <div class="checkbox-group">
                <input type="radio" id="fiscalSimples" name="tipoSistema" value="Fiscal Simples" required>
                <label for="fiscalSimples">Fiscal Simples</label><br>
                <input type="radio" id="fiscalNormal" name="tipoSistema" value="Fiscal Normal">
                <label for="fiscalNormal">Fiscal Normal</label><br>
                <input type="radio" id="fiscalMEI" name="tipoSistema" value="Fiscal MEI">
                <label for="fiscalMEI">Fiscal MEI</label><br>
                <input type="radio" id="gerencial" name="tipoSistema" value="Gerencial">
                <label for="gerencial">Gerencial</label>
            </div>

            <label>Módulos Adicionais:</label>
            <div class="checkbox-group">
                <input type="checkbox" name="modulos" value="NFC-e"> <label>NFC-e</label><br>
                <input type="checkbox" name="modulos" value="NF-e"> <label>NF-e</label><br>
                <input type="checkbox" name="modulos" value="NFS-e"> <label>NFS-e</label><br>
                <input type="checkbox" name="modulos" value="Backup Online"> <label>Backup Online</label>
            </div>

            <label for="migracao">Haverá Migração?</label>
            <select id="migracao" name="migracao" onchange="toggleMigrationDetails()" required>
                <option value="">Selecione</option>
                <option value="Sim">Sim</option>
                <option value="Nao">Não</option>
            </select>

            <div id="migrationDetails">
                <label for="dadosMigracao">Detalhes da Migração:</label>
                <textarea id="dadosMigracao" name="dadosMigracao" rows="4"></textarea>
            </div>

            <label for="observacao">Observação:</label>
            <textarea id="observacao" name="observacao" rows="4"></textarea>
        </form>

        <div id="actionSection">
            <h3>Relatório Gerado:</h3>
            <div id="reportOutput">Preencha o formulário para gerar o relatório...</div>
            <div class="action-buttons">
                <button type="button" id="sendToWhatsAppButton" onclick="sendToWhatsApp()">WhatsApp</button>
                <button type="button" id="copyReportButton" onclick="copyReportToClipboard()">Copiar</button>
                <button type="button" id="clearFormButton" onclick="clearFormAndReport()">Limpar Tudo</button>
            </div>
        </div>

        <div class="footer-message">
            <p><strong>* Observação:</strong> A falta de requisitos impedirá o cadastramento.</p>
        </div>
    </div>

    <script>
        // Máscaras
        function maskPhone(event) {
            let v = event.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d)/, "($1) $2");
            event.target.value = v;
        }

        function maskCnpj(event) {
            let v = event.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
            event.target.value = v;
        }

        function maskCep(event) {
            let v = event.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{5})(\d{3})/, "$1-$2");
            event.target.value = v;
            if (v.length === 9) buscaCep(v);
        }

        // Busca de CEP Automática
        async function buscaCep(cep) {
            const cleanCep = cep.replace(/\D/g, '');
            try {
                const response = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
                const data = await response.json();
                if (!data.erro) {
                    document.getElementById('logradouro').value = data.logradouro;
                    document.getElementById('bairro').value = data.bairro;
                    document.getElementById('cidade').value = data.localidade;
                    document.getElementById('uf').value = data.uf;
                    document.getElementById('numero').focus();
                    updateReport();
                }
            } catch (e) { console.error("Erro ao buscar CEP"); }
        }

        function toggleContractDetails() {
            const tipo = document.getElementById('tipoContrato').value;
            document.getElementById('contractDetails').style.display = tipo === 'Anual' ? 'block' : 'none';
            updateReport();
        }

        function togglePaymentInstallments() {
            const forma = document.getElementById('formaPagamento').value;
            document.getElementById('installments').style.display = forma === 'Cartao' ? 'block' : 'none';
            updateReport();
        }

        function toggleMigrationDetails() {
            const migra = document.getElementById('migracao').value;
            document.getElementById('migrationDetails').style.display = migra === 'Sim' ? 'block' : 'none';
            updateReport();
        }

        function updateReport() {
            const form = document.getElementById('customerForm');
            const data = new FormData(form);
            let msg = "📝 *DADOS DO CADASTRO DE CLIENTE*\n\n";
            
            msg += `*Empresa:* ${data.get('nomeFantasia') || '-'}\n`;
            msg += `*Responsável:* ${data.get('nomeResponsavel') || '-'}\n`;
            msg += `*CNPJ:* ${data.get('cnpj') || '-'}\n`;
            msg += `*Celular:* ${data.get('celular') || '-'}\n\n`;
            
            msg += `📍 *ENDEREÇO:*\n`;
            msg += `${data.get('logradouro')}, ${data.get('numero')}\n`;
            msg += `${data.get('bairro')} - ${data.get('cidade')}/${data.get('uf')}\n`;
            msg += `CEP: ${data.get('cep')}\n`;
            if(data.get('complemento')) msg += `Comp: ${data.get('complemento')}\n`;
            
            msg += `\n*Financeiro:* ${data.get('emailCobranca')}\n`;
            msg += `*Regime:* ${data.get('regimeEmpresa')}\n`;
            msg += `*Contrato:* ${data.get('tipoContrato')} - R$ ${data.get('valorContrato')}\n`;
            
            if(data.get('tipoContrato') === 'Anual') {
                msg += `*Pagamento:* ${data.get('formaPagamento')} (Dia ${data.get('diaVencimento')})\n`;
            }

            msg += `\n*Sistema:* ${data.get('tipoSistema')}\n`;
            
            const modulos = [];
            document.querySelectorAll('input[name="modulos"]:checked').forEach(i => modulos.push(i.value));
            msg += `*Módulos:* ${modulos.join(', ') || 'Nenhum'}\n`;
            
            msg += `\n*Migração:* ${data.get('migracao')}\n`;
            msg += `*Obs:* ${data.get('observacao') || 'Nenhuma'}`;

            document.getElementById('reportOutput').innerText = msg;
            localStorage.setItem('tempReport', msg);
        }

        function sendToWhatsApp() {
            const report = localStorage.getItem('tempReport');
            if(!document.getElementById('customerForm').checkValidity()) {
                document.getElementById('customerForm').reportValidity();
                return;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
        }

        function copyReportToClipboard() {
            const report = document.getElementById('reportOutput').innerText;
            navigator.clipboard.writeText(report).then(() => alert('Copiado!'));
        }

        function clearFormAndReport() {
            if(confirm('Limpar tudo?')) {
                document.getElementById('customerForm').reset();
                updateReport();
            }
        }

        // Listeners
        window.onload = () => {
            document.getElementById('celular').addEventListener('input', maskPhone);
            document.getElementById('telefoneCobranca').addEventListener('input', maskPhone);
            document.getElementById('telefoneSuporte').addEventListener('input', maskPhone);
            document.getElementById('cnpj').addEventListener('input', maskCnpj);
            document.getElementById('cep').addEventListener('input', maskCep);
            
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('input', updateReport);
            });
        };
    </script>
</body>
</html>
