<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Cliente Full</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            box-sizing: border-box;
        }

        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            max-width: 850px;
            margin: 10px auto;
        }

        h2 { color: #333; text-align: center; margin-bottom: 20px; font-weight: 700; }
        h3 { margin-top: 25px; font-size: 1.1em; color: #007bff; border-bottom: 2px solid #f0f2f5; padding-bottom: 5px; }

        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 0.85em; }

        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 180px; margin-bottom: 5px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #cdd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95em;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 12px;
            cursor: pointer;
            height: 38px;
        }

        /* Estilo dos Seletores de Sistema (Melhoria Solicitada) */
        .sistema-selector { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .sistema-option {
            background: #f8f9fa;
            border: 2px solid #ddd;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.2s;
            color: #555;
        }
        .sistema-option.active { background: #007bff; color: white; border-color: #0056b3; }

        /* Estilo dos Módulos Organizados (Melhoria Solicitada) */
        .modules-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .module-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        .module-item input { width: 16px; height: 16px; margin: 0; }

        #reportOutput {
            white-space: pre-wrap;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .action-buttons button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        #sendToWhatsAppButton { background-color: #25d366; }
        #copyReportButton { background-color: #007bff; }
        #clearFormButton { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastro de Cliente</h2>

    <form id="customerForm">
        <h3>Dados da Empresa</h3>
        <label>CNPJ:</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00">
            <button type="button" class="btn-search" onclick="buscaCnpj()">🔍</button>
        </div>

        <label>Razão Social:</label>
        <input type="text" id="razaoSocial" name="razaoSocial">

        <label>Nome Fantasia:</label>
        <input type="text" id="nomeFantasia" name="nomeFantasia">

        <div class="form-row">
            <div class="form-group">
                <label>Nome do Responsável:</label>
                <input type="text" id="nomeResponsavel" name="nomeResponsavel">
            </div>
            <div class="form-group">
                <label>Celular (WhatsApp):</label>
                <input type="tel" id="celular" name="celular" placeholder="(00) 00000-0000">
            </div>
        </div>

        <h3>Endereço Completo</h3>
        <div class="form-row">
            <div class="form-group" style="flex: 0 0 30%;">
                <label>CEP:</label>
                <input type="text" id="cep" name="cep" placeholder="00000-000">
            </div>
            <div class="form-group">
                <label>Logradouro:</label>
                <input type="text" id="logradouro" name="logradouro">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 0 0 20%;">
                <label>Número:</label>
                <input type="text" id="numero" name="numero">
            </div>
            <div class="form-group">
                <label>Complemento:</label>
                <input type="text" id="complemento" name="complemento">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group"><label>Bairro:</label><input type="text" id="bairro" name="bairro"></div>
            <div class="form-group"><label>Cidade:</label><input type="text" id="cidade" name="cidade"></div>
            <div class="form-group" style="flex: 0 0 15%;"><label>UF:</label><input type="text" id="uf" name="uf" maxlength="2"></div>
        </div>

        <h3>Financeiro & Contrato</h3>
        <div class="form-row">
            <div class="form-group">
                <label>E-mail Financeiro:</label>
                <input type="email" id="emailCobranca" name="emailCobranca">
            </div>
            <div class="form-group">
                <label>Tel. Financeiro:</label>
                <input type="tel" id="telefoneCobranca" name="telefoneCobranca">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Tel. Suporte (TI):</label>
                <input type="tel" id="telefoneSuporte" name="telefoneSuporte">
            </div>
            <div class="form-group">
                <label>Regime da Empresa:</label>
                <select id="regimeEmpresa" name="regimeEmpresa">
                    <option value="">Selecione</option>
                    <option value="Simples Nacional">Simples Nacional</option>
                    <option value="Lucro Presumido">Lucro Presumido</option>
                    <option value="Lucro Real">Lucro Real</option>
                    <option value="MEI">MEI</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group"><label>Valor Mensal (R$):</label><input type="text" id="valorContrato" name="valorContrato" placeholder="0,00"></div>
            <div class="form-group">
                <label>Recorrência:</label>
                <select id="tipoContrato" name="tipoContrato" onchange="toggleContractDetails()">
                    <option value="">Selecione</option>
                    <option value="Anual">Anual</option>
                    <option value="Mensal">Mensal</option>
                </select>
            </div>
        </div>

        <div id="contractDetails" style="display:none; background: #fffceb; border: 1px solid #ffeeba; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <div class="form-row">
                <div class="form-group">
                    <label>Forma de Pagamento:</label>
                    <select id="formaPagamento" name="formaPagamento">
                        <option value="">Selecione</option>
                        <option value="Boleto">Boleto</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Pix">Pix</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dia Vencimento:</label>
                    <input type="number" id="diaVencimento" name="diaVencimento" min="1" max="31">
                </div>
            </div>
        </div>

        <h3>Tipo de Sistema</h3>
        <input type="hidden" id="tipoSistemaHidden" name="tipoSistema" value="">
        <div class="sistema-selector">
            <div class="sistema-option" onclick="selectSistema(this, 'Fiscal Simples', 'fiscal')">Fiscal Simples</div>
            <div class="sistema-option" onclick="selectSistema(this, 'Fiscal Normal', 'fiscal')">Fiscal Normal</div>
            <div class="sistema-option" onclick="selectSistema(this, 'Fiscal MEI', 'fiscal')">Fiscal MEI</div>
            <div class="sistema-option" onclick="selectSistema(this, 'Gerencial', 'gerencial')">Gerencial</div>
        </div>

        <div id="modulosSection" style="display: none; margin-bottom: 20px;">
            <label>Módulos Adicionais:</label>
            <div id="modulesContainer" class="modules-container"></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Haverá Migração?</label>
                <select id="migracao" name="migracao" onchange="toggleMigrationDetails()">
                    <option value="Nao">Não</option>
                    <option value="Sim">Sim</option>
                </select>
            </div>
        </div>

        <div id="migrationDetails" style="display:none;">
            <label>O que será migrado?</label>
            <textarea id="dadosMigracao" name="dadosMigracao" rows="2"></textarea>
        </div>

        <label>Observação Geral:</label>
        <textarea id="observacao" name="observacao" rows="3"></textarea>
    </form>

    <div style="margin-top: 30px;">
        <h3>Relatório Gerado</h3>
        <div id="reportOutput">O relatório aparecerá aqui...</div>
        
        <div class="action-buttons">
            <button type="button" id="sendToWhatsAppButton" onclick="sendToWhatsApp()">Enviar WhatsApp</button>
            <button type="button" id="copyReportButton" onclick="copyReportToClipboard()">Copiar Texto</button>
            <button type="button" id="clearFormButton" onclick="clearFormAndReport()">Limpar Tudo</button>
        </div>
    </div>
</div>

<script>
    const moduleOptions = {
        fiscal: ["NFC-e", "NF-e", "NFS-e", "Estoque", "Financeiro", "Orçamento", "Pedido", "Backup Online", "App Vendas", "MD-e"],
        gerencial: ["Estoque", "Financeiro", "Orçamento", "Pedido", "Relatórios Geren.", "Backup Online", "App Vendas", "Controle Frota"]
    };

    function selectSistema(element, nome, tipo) {
        document.querySelectorAll('.sistema-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('tipoSistemaHidden').value = nome;
        renderModules(tipo);
    }

    function renderModules(type) {
        const container = document.getElementById('modulesContainer');
        document.getElementById('modulosSection').style.display = 'block';
        container.innerHTML = '';
        moduleOptions[type].forEach(mod => {
            const div = document.createElement('div');
            div.className = 'module-item';
            div.onclick = (e) => {
                const cb = div.querySelector('input');
                if(e.target !== cb) cb.checked = !cb.checked;
                updateReport();
            };
            div.innerHTML = `<input type="checkbox" name="modulos" value="${mod}"> <span>${mod}</span>`;
            container.appendChild(div);
        });
        updateReport();
    }

    async function buscaCnpj() {
        const cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
        if (cnpj.length !== 14) return alert("CNPJ inválido");
        try {
            const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            const data = await res.json();
            document.getElementById('razaoSocial').value = data.razao_social || '';
            document.getElementById('nomeFantasia').value = data.nome_fantasia || '';
            document.getElementById('logradouro').value = data.logradouro || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('cidade').value = data.municipio || '';
            document.getElementById('uf').value = data.uf || '';
            document.getElementById('cep').value = data.cep || '';
            updateReport();
        } catch (e) { alert("Erro ao buscar CNPJ"); }
    }

    function toggleContractDetails() {
        document.getElementById('contractDetails').style.display = document.getElementById('tipoContrato').value ? 'block' : 'none';
        updateReport();
    }

    function toggleMigrationDetails() {
        document.getElementById('migrationDetails').style.display = document.getElementById('migracao').value === 'Sim' ? 'block' : 'none';
        updateReport();
    }

    function updateReport() {
        const form = document.getElementById('customerForm');
        const data = new FormData(form);
        const mods = [];
        document.querySelectorAll('input[name="modulos"]:checked').forEach(i => mods.push(i.value));

        let msg = "📝 *NOVO CADASTRO DE CLIENTE*\n\n";
        msg += "*[DADOS DA EMPRESA]*\n";
        msg += `• CNPJ: ${data.get('cnpj') || '-'}\n`;
        msg += `• Razão: ${data.get('razaoSocial') || '-'}\n`;
        msg += `• Fantasia: ${data.get('nomeFantasia') || '-'}\n`;
        msg += `• Responsável: ${data.get('nomeResponsavel') || '-'}\n`;
        msg += `• WhatsApp: ${data.get('celular') || '-'}\n\n`;

        msg += "*[ENDEREÇO]*\n";
        msg += `• CEP: ${data.get('cep') || '-'}\n`;
        msg += `• Logradouro: ${data.get('logradouro')}, ${data.get('numero')}\n`;
        msg += `• Bairro: ${data.get('bairro')}\n`;
        msg += `• Cidade: ${data.get('cidade')}/${data.get('uf')}\n\n`;

        msg += "*[FINANCEIRO]*\n";
        msg += `• E-mail Fin: ${data.get('emailCobranca') || '-'}\n`;
        msg += `• Tel. Fin: ${data.get('telefoneCobranca') || '-'}\n`;
        msg += `• Tel. Suporte: ${data.get('telefoneSuporte') || '-'}\n`;
        msg += `• Regime: ${data.get('regimeEmpresa') || '-'}\n`;
        msg += `• Valor: R$ ${data.get('valorContrato') || '0,00'}\n`;
        msg += `• Recorrência: ${data.get('tipoContrato') || '-'}\n`;
        if(data.get('tipoContrato')) {
            msg += `• Pagamento: ${data.get('formaPagamento')}\n`;
            msg += `• Vencimento: Dia ${data.get('diaVencimento')}\n`;
        }
        msg += "\n";

        msg += "*[SISTEMA]*\n";
        msg += `• Tipo: ${data.get('tipoSistema') || '-'}\n`;
        msg += `• Módulos: ${mods.join(', ') || 'Somente Base'}\n\n`;

        msg += "*[OBSERVAÇÕES]*\n";
        msg += `• Migração: ${data.get('migracao')}\n`;
        if(data.get('migracao') === 'Sim') msg += `• O que migrar: ${data.get('dadosMigracao')}\n`;
        msg += `• Obs: ${data.get('observacao') || 'Nenhuma'}`;

        document.getElementById('reportOutput').innerText = msg;
    }

    const maskTel = (id) => {
        document.getElementById(id).oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            e.target.value = v;
            updateReport();
        };
    };

    window.onload = () => {
        document.getElementById('cnpj').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
            e.target.value = v;
            updateReport();
        };
        document.getElementById('cep').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
            updateReport();
        };
        maskTel('celular');
        maskTel('telefoneCobranca');
        maskTel('telefoneSuporte');

        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('input', updateReport);
            el.addEventListener('change', updateReport);
        });
    };

    function sendToWhatsApp() {
        const text = document.getElementById('reportOutput').innerText;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function copyReportToClipboard() {
        const text = document.getElementById('reportOutput').innerText;
        navigator.clipboard.writeText(text).then(() => alert('Copiado!'));
    }

    function clearFormAndReport() {
        if(confirm('Limpar tudo?')) {
            document.getElementById('customerForm').reset();
            document.querySelectorAll('.sistema-option').forEach(o => o.classList.remove('active'));
            document.getElementById('modulosSection').style.display = 'none';
            updateReport();
        }
    }
</script>

</body>
</html>
