<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Cliente</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            max-width: 750px;
            margin: 10px auto;
            box-sizing: border-box;
            flex-grow: 1;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 700;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
            font-size: 0.85em;
        }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 180px;
            margin-bottom: 5px;
        }

        .input-btn-group {
            display: flex;
            gap: 5px;
        }

        input[type="text"], input[type="email"], input[type="tel"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #cdd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95em;
            color: #333;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 12px;
            margin-bottom: 12px;
            cursor: pointer;
            min-width: 45px;
        }

        .message {
            background-color: #e7f3fe;
            border-left: 5px solid #2196F3;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        #actionSection {
            margin-top: 30px;
            border-top: 2px dashed #d0d0d0;
            padding-top: 20px;
        }

        #reportOutput {
            white-space: pre-wrap;
            background-color: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            font-family: monospace;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
        }

        #sendToWhatsAppButton { background-color: #25d366; }
        #copyReportButton { background-color: #007bff; }
        #clearFormButton { background-color: #dc3545; }

        .modules-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        .module-item {
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        @media (max-width: 768px) { .form-group { min-width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastro de Cliente</h2>
        <div class="message"><strong>Atenção:</strong> Prazo de 24h para processamento.</div>

        <form id="customerForm">
            <label for="cnpj">CNPJ:</label>
            <div class="input-btn-group">
                <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" required>
                <button type="button" id="btnCnpj" class="btn-search" onclick="buscaCnpj()">🔍</button>
            </div>

            <label for="razaoSocial">Razão Social:</label>
            <input type="text" id="razaoSocial" name="razaoSocial" required>

            <label for="nomeFantasia">Nome Fantasia:</label>
            <input type="text" id="nomeFantasia" name="nomeFantasia" required>

            <label for="nomeResponsavel">Nome do Responsável:</label>
            <input type="text" id="nomeResponsavel" name="nomeResponsavel" required>

            <div class="form-row">
                <div class="form-group">
                    <label for="celular">Celular:</label>
                    <input type="tel" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX" required>
                </div>
            </div>

            <h3 style="margin-top: 20px; font-size: 1.1em; border-bottom: 1px solid #eee;">Endereço</h3>
            <div class="form-row">
                <div class="form-group" style="flex: 0 0 40%;">
                    <label for="cep">CEP:</label>
                    <div class="input-btn-group">
                        <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                        <button type="button" id="btnCep" class="btn-search" onclick="triggerCep()">🔍</button>
                    </div>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="logradouro">Logradouro:</label>
                    <input type="text" id="logradouro" name="logradouro" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 0 0 25%;">
                    <label for="numero">Número:</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="complemento">Complemento:</label>
                    <input type="text" id="complemento" name="complemento">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group"><label for="bairro">Bairro:</label><input type="text" id="bairro" name="bairro" required></div>
                <div class="form-group"><label for="cidade">Cidade:</label><input type="text" id="cidade" name="cidade" required></div>
                <div class="form-group" style="flex: 0 0 20%;"><label for="uf">UF:</label><input type="text" id="uf" name="uf" required maxlength="2"></div>
            </div>

            <label for="emailCobranca">E-mail de Cobrança:</label>
            <input type="email" id="emailCobranca" name="emailCobranca" required>

            <div class="form-row">
                <div class="form-group"><label for="telefoneCobranca">Tel. Cobrança:</label><input type="tel" id="telefoneCobranca" name="telefoneCobranca" required></div>
                <div class="form-group"><label for="telefoneSuporte">Tel. Suporte:</label><input type="tel" id="telefoneSuporte" name="telefoneSuporte" required></div>
            </div>

            <label for="regimeEmpresa">Regime da Empresa:</label>
            <select id="regimeEmpresa" name="regimeEmpresa" required>
                <option value="">Selecione</option>
                <option value="Simples Nacional">Simples Nacional</option>
                <option value="Lucro Presumido">Lucro Presumido</option>
                <option value="Lucro Real">Lucro Real</option>
                <option value="MEI">MEI</option>
            </select>

            <div class="form-row">
                <div class="form-group"><label for="valorContrato">Valor do Contrato:</label><input type="text" id="valorContrato" name="valorContrato" required></div>
                <div class="form-group">
                    <label for="tipoContrato">Tipo de Contrato:</label>
                    <select id="tipoContrato" name="tipoContrato" onchange="toggleContractDetails()" required>
                        <option value="">Selecione</option>
                        <option value="Anual">Anual</option>
                        <option value="Mensal">Mensal</option>
                    </select>
                </div>
            </div>

            <div id="contractDetails" style="display:none; border: 1px solid #eee; padding: 10px; margin-bottom: 15px;">
                <label for="formaPagamento">Pagamento:</label>
                <select id="formaPagamento" name="formaPagamento">
                    <option value="">Selecione</option>
                    <option value="Boleto">Boleto</option>
                    <option value="Cartao">Cartão</option>
                    <option value="Pix">Pix</option>
                </select>
                <label for="diaVencimento">Dia Vencimento:</label>
                <input type="number" id="diaVencimento" name="diaVencimento" min="1" max="31">
            </div>

            <label>Tipo de Sistema:</label>
            <div style="font-size: 0.9em; margin-bottom: 10px;">
                <input type="radio" id="f1" name="tipoSistema" value="Fiscal Simples" onclick="renderModules('fiscal')"> <label for="f1">Fiscal Simples</label> |
                <input type="radio" id="f2" name="tipoSistema" value="Fiscal Normal" onclick="renderModules('fiscal')"> <label for="f2">Fiscal Normal</label> |
                <input type="radio" id="f3" name="tipoSistema" value="Fiscal MEI" onclick="renderModules('fiscal')"> <label for="f3">Fiscal MEI</label> |
                <input type="radio" id="f4" name="tipoSistema" value="Gerencial" onclick="renderModules('gerencial')"> <label for="f4">Gerencial</label>
            </div>

            <div id="modulosSection" style="display: none;">
                <label>Módulos Adicionais:</label>
                <div id="modulesContainer" class="modules-container"></div>
            </div>

            <label for="migracao">Haverá Migração?</label>
            <select id="migracao" name="migracao" onchange="toggleMigrationDetails()" required>
                <option value="">Selecione</option>
                <option value="Sim">Sim</option>
                <option value="Nao">Não</option>
            </select>

            <div id="migrationDetails" style="display:none;"><textarea id="dadosMigracao" name="dadosMigracao" rows="3"></textarea></div>

            <label for="observacao">Observação:</label>
            <textarea id="observacao" name="observacao" rows="3"></textarea>
        </form>

        <div id="actionSection">
            <div id="reportOutput">Relatório...</div>
            <div class="action-buttons">
                <button type="button" id="sendToWhatsAppButton" onclick="sendToWhatsApp()">WhatsApp</button>
                <button type="button" id="copyReportButton" onclick="copyReportToClipboard()">Copiar</button>
                <button type="button" id="clearFormButton" onclick="clearFormAndReport()">Limpar</button>
            </div>
        </div>
    </div>

    <script>
        const moduleOptions = {
            fiscal: ["Orçamento", "Pedido", "NFC-e", "NF-e", "NFS-e", "Backup Online"],
            gerencial: ["Orçamento", "Pedido", "Relatórios Personalizados", "Backup Online", "Controle Financeiro"]
        };

        function renderModules(type) {
            const container = document.getElementById('modulesContainer');
            const section = document.getElementById('modulosSection');
            container.innerHTML = '';
            section.style.display = 'block';

            moduleOptions[type].forEach(mod => {
                const div = document.createElement('div');
                div.className = 'module-item';
                div.innerHTML = `<input type="checkbox" name="modulos" value="${mod}" onchange="updateReport()"> <span>${mod}</span>`;
                container.appendChild(div);
            });
            updateReport();
        }

        // --- CONSULTAS API ---
        async function buscaCnpj() {
            const btn = document.getElementById('btnCnpj');
            const cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
            if (cnpj.length !== 14) return alert("CNPJ incompleto");
            btn.innerText = "⏳";
            try {
                const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
                const data = await res.json();
                document.getElementById('razaoSocial').value = data.razao_social || '';
                document.getElementById('nomeFantasia').value = data.nome_fantasia || data.razao_social || '';
                document.getElementById('logradouro').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.municipio || '';
                document.getElementById('uf').value = data.uf || '';
                document.getElementById('cep').value = data.cep || '';
                updateReport();
            } catch (e) { alert("Erro ao consultar CNPJ"); }
            finally { btn.innerText = "🔍"; }
        }

        async function buscaCep(cepValue) {
            try {
                const res = await fetch(`https://brasilapi.com.br/api/cep/v1/${cepValue.replace(/\D/g, '')}`);
                const data = await res.json();
                document.getElementById('logradouro').value = data.street || '';
                document.getElementById('bairro').value = data.neighborhood || '';
                document.getElementById('cidade').value = data.city || '';
                document.getElementById('uf').value = data.state || '';
                updateReport();
            } catch (e) { console.log("Erro CEP"); }
        }

        function triggerCep() { 
            const val = document.getElementById('cep').value;
            if(val.length >= 8) buscaCep(val);
        }

        // --- LÓGICA GERAL ---
        function toggleContractDetails() {
            document.getElementById('contractDetails').style.display = document.getElementById('tipoContrato').value ? 'block' : 'none';
        }

        function toggleMigrationDetails() {
            document.getElementById('migrationDetails').style.display = document.getElementById('migracao').value === 'Sim' ? 'block' : 'none';
        }

        function updateReport() {
            const form = document.getElementById('customerForm');
            const data = new FormData(form);
            let msg = "📝 *DADOS DO CADASTRO*\n\n";
            msg += `*CNPJ:* ${data.get('cnpj') || '-'}\n*Razão:* ${data.get('razaoSocial')}\n*Fantasia:* ${data.get('nomeFantasia')}\n`;
            msg += `*Celular:* ${data.get('celular')}\n*Sistema:* ${data.get('tipoSistema') || '-'}\n`;
            
            const mods = [];
            document.querySelectorAll('input[name="modulos"]:checked').forEach(i => mods.push(i.value));
            msg += `*Módulos:* ${mods.join(', ') || 'Nenhum'}\n`;
            msg += `*Obs:* ${data.get('observacao') || 'Nenhuma'}`;
            
            document.getElementById('reportOutput').innerText = msg;
            localStorage.setItem('tempReport', msg);
        }

        // Máscaras e Listeners
        window.onload = () => {
            document.getElementById('cnpj').oninput = (e) => {
                let v = e.target.value.replace(/\D/g, '');
                v = v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
                e.target.value = v;
            };
            document.getElementById('cep').oninput = (e) => {
                let v = e.target.value.replace(/\D/g, '');
                v = v.replace(/^(\d{5})(\d)/, "$1-$2");
                e.target.value = v;
                if(v.length === 9) buscaCep(v);
            };
            document.querySelectorAll('input, select, textarea').forEach(el => el.oninput = updateReport);
        };

        function sendToWhatsApp() {
            const report = localStorage.getItem('tempReport');
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
        }

        function copyReportToClipboard() {
            navigator.clipboard.writeText(document.getElementById('reportOutput').innerText).then(() => alert('Copiado!'));
        }

        function clearFormAndReport() {
            if(confirm('Limpar?')) { document.getElementById('customerForm').reset(); updateReport(); document.getElementById('modulosSection').style.display='none'; }
        }
    </script>
</body>
</html>
